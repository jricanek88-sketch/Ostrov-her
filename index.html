<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ostrov her</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#8fd9ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ostrov her">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root{
    --bg1:#fef6e4; --bg2:#e0f4ff; --ink:#3a2e39;
    --c1:#e74c3c; --c2:#4fa8e8; --c3:#5cb85c; --c4:#ffd23f;
    --c5:#ff8c42; --c6:#a06cd5; --c7:#a5682a; --c8:#ff6f9c; --c9:#2e7d32;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%; margin:0; overflow:hidden; font-family:'Baloo 2','Comic Sans MS',system-ui,sans-serif; overscroll-behavior:none;}
  .screen{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center; overflow-y:scroll; overflow-x:hidden; -webkit-overflow-scrolling:touch; touch-action:pan-y; }
  .screen.active{ display:flex; }
  .backBtn{
    position:fixed; top:2vh; left:3vw; z-index:20;
    width:52px; height:52px; border-radius:50%; border:none;
    background:#ffffffdd; box-shadow:0 6px 14px rgba(0,0,0,0.2);
    font-size:24px; display:flex; align-items:center; justify-content:center;
  }

  /* ---------- HOME / ISLAND (skutečná grafika) ---------- */
  #screen-home{
    position:relative;
    background: linear-gradient(180deg, #bfe9ff, #eaf9ff);
    padding: 0;
    justify-content:flex-start;
  }
  #islandTitle{
    font-size:8vw; font-weight:800; color:#2c5a1f; text-shadow:2px 3px 0 #ffffffaa;
    margin: 2.5vh 0 1vh 0; position:relative; z-index:2;
  }
  #islandMap{ position:relative; width:92vw; max-width:520px; margin-bottom:5vh; }
  #islandImg{ display:block; width:100%; height:auto; user-select:none; pointer-events:none; }

  .node{
    position:absolute; display:flex; flex-direction:column; align-items:center; gap:4px;
    transform:translate(-50%, -50%); z-index:3;
  }
  .node.withStone .stone{
    position:absolute; inset:0; width:100%; height:100%;
  }
  .stone{ display:block; }
  .stoneIcon{
    position:relative; z-index:2;
    width:11vw; max-width:64px;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,0.3));
    transform:translateY(-4%);
  }
  .node:active .stoneIcon{ transform: translateY(2%) scale(0.94); }
  .node.withStone{ width:16vw; max-width:92px; }
  .node.withStone .stone{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-58%);
    width:100%; height:auto; z-index:1;
  }
  .node.withStone .stoneIcon{ z-index:2; }
  .nodeLabel{
    font-weight:800; color:#2c5a1f; background:#ffffffe6; padding:2px 12px;
    border-radius:20px; font-size:3.3vw; box-shadow:0 4px 8px rgba(0,0,0,0.15); white-space:nowrap;
    margin-top:2px;
  }

  /* ---------- SHARED: cheer / confetti ---------- */
  #confetti{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf{ position:absolute; top:-10%; font-size:28px; }
  #cheer{ position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(0); font-size:18vw; z-index:51; pointer-events:none; }
  @keyframes fall{ to{ top:110%; transform:rotate(360deg);} }

  /* ---------- COLORING ---------- */
  #screen-coloring{ background:radial-gradient(circle at 20% 10%, var(--bg2), var(--bg1) 60%); justify-content:center; }
  #title{ font-size:6.5vw; font-weight:800; color:var(--ink); margin:6vh 0 1vh 0; text-shadow:2px 3px 0 #ffffffaa; }
  #boardWrap{ background:#ffffffcc; border-radius:28px; padding:3vw; box-shadow:0 10px 30px rgba(0,0,0,0.12); }
  #board{ display:grid; gap:2.2vw; }
  #previewWrap{ background:#ffffffcc; border-radius:22px; padding:1.6vw; box-shadow:0 8px 20px rgba(0,0,0,0.10); margin-bottom:2vh; }
  #preview{ display:grid; gap:0.6vw; }
  .pcell{ width:3.2vw; height:3.2vw; max-width:22px; max-height:22px; border-radius:4px; background:transparent; }
  .cell{ width:9vw; height:9vw; max-width:60px; max-height:60px; border-radius:10px; background:#fff; border:2.5px solid #dcd6e0; transition:transform .12s ease; }
  .cell.blank{ border-color:transparent; background:transparent; }
  .cell.target{ border-style:dashed; }
  .cell.filled{ border-style:solid; transform:scale(1.02); }
  .cell.wrong{ animation:shake .3s ease; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
  #palette{ display:flex; gap:3vw; margin:3vh 0 1vh 0; background:#ffffffcc; padding:2vw 4vw; border-radius:40px; box-shadow:0 8px 20px rgba(0,0,0,0.10); }
  .swatch{ width:13vw; height:13vw; max-width:68px; max-height:68px; border-radius:50%; border:4px solid white; box-shadow:0 4px 10px rgba(0,0,0,0.15); transition:transform .15s ease; }
  .swatch.selected{ transform:scale(1.22); box-shadow:0 0 0 5px #fff, 0 0 0 9px currentColor; }
  #nextRow{ margin:2.5vh 0 4vh 0; display:flex; gap:16px; align-items:center; }
  .bigBtn{ background:#ffffffcc; border:none; border-radius:30px; padding:10px 22px; font-size:4vw; color:var(--ink); box-shadow:0 6px 14px rgba(0,0,0,0.10); }

  /* ---------- MEMORY (PEXESO) ---------- */
  #screen-memory{ background:radial-gradient(circle at 80% 10%, #ffe0f0, #fef6e4 60%); justify-content:center; }
  #memGrid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:4vw; margin-top:8vh; }
  .card{ width:22vw; height:22vw; max-width:120px; max-height:120px; perspective:600px; }
  .cardInner{ position:relative; width:100%; height:100%; transition:transform .4s; transform-style:preserve-3d; }
  .card.flipped .cardInner{ transform:rotateY(180deg); }
  .cardFace{ position:absolute; inset:0; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:11vw; backface-visibility:hidden; box-shadow:0 6px 14px rgba(0,0,0,0.15); }
  .cardBack{ background:linear-gradient(135deg,#a06cd5,#4fa8e8); }
  .cardFront{ background:#fff; transform:rotateY(180deg); }
  .card.matched .cardFront{ background:#d6ffd6; }

  /* ---------- BUBBLES ---------- */
  #screen-bubbles{ background:linear-gradient(180deg,#bfe9ff,#eaf9ff); justify-content:flex-start; }
  #bubbleArea{ position:absolute; inset:0; width:100%; height:100%; }
  .bubble{ position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:6vw; box-shadow:inset -6px -6px 12px rgba(255,255,255,0.5), 0 4px 10px rgba(0,0,0,0.1); }
  .popCount{ position:fixed; top:2vh; right:3vw; background:#ffffffcc; padding:8px 18px; border-radius:20px; font-weight:800; font-size:4.5vw; z-index:20; }

  /* ---------- PUZZLE ---------- */
  #screen-puzzle{ background:radial-gradient(circle at 20% 80%, #d7f9d0, #fef6e4 60%); justify-content:center; }
  #puzzleTarget{ display:grid; grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); gap:6px; width:56vw; height:56vw; max-width:300px; max-height:300px; margin-top:8vh; background:#ffffffcc; border-radius:20px; padding:6px; box-shadow:0 10px 24px rgba(0,0,0,0.15); }
  .slot{ border-radius:12px; border:3px dashed #cfcfcf; overflow:hidden; position:relative; background:#f5f5f5; }
  #puzzleTray{ display:flex; gap:4vw; margin-top:4vh; flex-wrap:wrap; justify-content:center; width:80vw; }
  .piece{ width:22vw; height:22vw; max-width:120px; max-height:120px; border-radius:12px; overflow:hidden; position:relative; background:#fff; box-shadow:0 6px 14px rgba(0,0,0,0.15); border:3px solid #fff; }
  .piece.selected{ border-color:#ffd23f; transform:scale(1.08); }
  .pieceEmoji{ position:absolute; display:flex; align-items:center; justify-content:center; }

  /* ---------- ANIMAL SOUNDS ---------- */
  #screen-animals{ background:radial-gradient(circle at 50% 0%, #fff3d0, #fef6e4 60%); justify-content:center; }
  #animalGrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:4vw; margin-top:8vh; }
  .animalBtn{ width:24vw; height:24vw; max-width:130px; max-height:130px; border-radius:24px; border:none; font-size:13vw; background:#ffffffdd; box-shadow:0 8px 16px rgba(0,0,0,0.15); }
  .animalBtn:active{ transform:scale(0.92); }
  #speechBubble{ position:fixed; top:20vh; left:50%; transform:translate(-50%,0) scale(0); background:#fff; border-radius:24px; padding:16px 28px; font-size:8vw; font-weight:800; box-shadow:0 10px 24px rgba(0,0,0,0.2); z-index:30; }
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div class="screen active" id="screen-home">
  <div id="islandTitle">🏝️ Ostrov her</div>
  <div id="islandMap">
    <img id="islandImg" src="island-bg.png" alt="Ostrov">
    <div class="node" data-screen="screen-coloring" style="left:62.5%; top:29.2%;">
      <img class="stoneIcon" src="icon-coloring.png" alt="Vybarvování">
      <div class="nodeLabel">Vybarvování</div>
    </div>
    <div class="node" data-screen="screen-memory" style="left:39.1%; top:42.1%;">
      <img class="stoneIcon" src="icon-memory.png" alt="Pexeso">
      <div class="nodeLabel">Pexeso</div>
    </div>
    <div class="node" data-screen="screen-bubbles" style="left:69.9%; top:53.7%;">
      <img class="stoneIcon" src="icon-bubbles.png" alt="Bubliny">
      <div class="nodeLabel">Bubliny</div>
    </div>
    <div class="node" data-screen="screen-puzzle" style="left:42.7%; top:71.9%;">
      <img class="stoneIcon" src="icon-puzzle.png" alt="Puzzle">
      <div class="nodeLabel">Puzzle</div>
    </div>
    <div class="node withStone" data-screen="screen-animals" style="left:50%; top:89%;">
      <img class="stone" src="stone.png" alt="">
      <img class="stoneIcon" src="icon-paw.png" alt="Zvířátka">
      <div class="nodeLabel">Zvířátka</div>
    </div>
  </div>
</div>

<!-- ============ COLORING ============ -->
<div class="screen" id="screen-coloring">
  <button class="backBtn" data-back>⬅️</button>
  <div id="title">🎨 Vybarvi obrázek</div>
  <div id="previewWrap"><div id="preview"></div></div>
  <div id="boardWrap"><div id="board"></div></div>
  <div id="palette"></div>
  <div id="nextRow"><button class="bigBtn" id="skip">Další obrázek ➜</button></div>
</div>

<!-- ============ MEMORY ============ -->
<div class="screen" id="screen-memory">
  <button class="backBtn" data-back>⬅️</button>
  <div id="title2" style="font-size:6.5vw;font-weight:800;color:var(--ink);margin:6vh 0 0 0;">🧠 Najdi dvojice</div>
  <div id="memGrid"></div>
  <div id="nextRow"><button class="bigBtn" id="memNew">Nová hra 🔀</button></div>
</div>

<!-- ============ BUBBLES ============ -->
<div class="screen" id="screen-bubbles">
  <button class="backBtn" data-back>⬅️</button>
  <div class="popCount" id="popCount">🫧 0</div>
  <div id="bubbleArea"></div>
</div>

<!-- ============ PUZZLE ============ -->
<div class="screen" id="screen-puzzle">
  <button class="backBtn" data-back>⬅️</button>
  <div id="title3" style="font-size:6.5vw;font-weight:800;color:var(--ink);margin:2vh 0 0 0;">🧩 Poskládej obrázek</div>
  <div id="puzzleTarget"></div>
  <div id="puzzleTray"></div>
  <div id="nextRow"><button class="bigBtn" id="puzzleNew">Nová skládačka 🔀</button></div>
</div>

<!-- ============ ANIMAL SOUNDS ============ -->
<div class="screen" id="screen-animals">
  <button class="backBtn" data-back>⬅️</button>
  <div id="title4" style="font-size:6.5vw;font-weight:800;color:var(--ink);margin:5vh 0 0 0;">🐾 Poslouchej a hádej</div>
  <button id="playSound" style="width:28vw;height:28vw;max-width:150px;max-height:150px;border-radius:50%;border:none;background:linear-gradient(135deg,#ffd23f,#ff8c42);font-size:14vw;box-shadow:0 8px 16px rgba(0,0,0,0.2);margin:3vh 0;">🔊</button>
  <div id="animalGrid"></div>
</div>

<div id="confetti"></div>
<div id="cheer">⭐</div>
<div id="speechBubble"></div>

<script>
/* ============================================================
   NAVIGACE MEZI OBRAZOVKAMI
============================================================ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-bubbles') startBubbles(); else stopBubbles();
  if(id === 'screen-animals') newAnimalRound();
}
document.querySelectorAll('.node').forEach(n => {
  n.addEventListener('click', () => showScreen(n.dataset.screen));
});
document.querySelectorAll('[data-back]').forEach(b => {
  b.addEventListener('click', () => showScreen('screen-home'));
});

function getVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
const COLORS = { 1:getVar('--c1'),2:getVar('--c2'),3:getVar('--c3'),4:getVar('--c4'),5:getVar('--c5'),6:getVar('--c6'),7:getVar('--c7'),8:getVar('--c8'),9:getVar('--c9') };

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function celebrate(){
  const cheer = document.getElementById('cheer');
  cheer.style.transition = 'transform .4s cubic-bezier(.34,1.56,.64,1)';
  cheer.style.transform = 'translate(-50%,-50%) scale(1.4)';
  setTimeout(() => { cheer.style.transform = 'translate(-50%,-50%) scale(0)'; }, 1200);
  const confettiWrap = document.getElementById('confetti');
  const emojis = ['🎉','⭐','🎈','✨','🌈'];
  for(let i=0;i<24;i++){
    const p = document.createElement('div');
    p.className = 'conf';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = Math.random()*100 + '%';
    p.style.animation = `fall ${1.2+Math.random()*1.2}s linear forwards`;
    confettiWrap.appendChild(p);
    setTimeout(() => p.remove(), 2600);
  }
}

/* ============================================================
   1) VYBARVOVÁNÍ
============================================================ */
const PICTURES = [
  { name:'Sluníčko', rows:['...4...','..454..','.45554.','4555554','.45554.','..454..','...4...']},
  { name:'Kytička', rows:['.8.8.8.','8.888.8','.88888.','..333..','..333..','..333..','.......']},
  { name:'Rybička', rows:['.......','..2222.','.222225','2222225','.222225','..2222.','.......']},
  { name:'Domeček', rows:['..777..','.77777.','7777777','.44444.','.44.44.','.44444.','.44444.']},
  { name:'Kočička', rows:['8.....8','88...88','.66666.','6666666','6.666.6','6666666','.66666.']},
  { name:'Keřík', rows:['.....333.....','....33333....','...3333333...','..333999333..','.33399993333.','.33399993333.','..333999333..','...3333333...','....33333....','.....777.....','.....777.....','.....777.....','.............']},
  { name:'Jablíčko', rows:['....7......','...7.3.....','...11111...','..1111111..','.111111111.','11111111111','11111111111','11111111111','.111111111.','..1111111..','...11111...']},
  { name:'Motýlek', rows:['..66.7.66..','.666.7.666.','6666.7.6666','6666.7.6666','.666.7.666.','..66.7.66..']},
  { name:'Balónek', rows:['..111..','.11111.','1111111','1111111','.11111.','..111..','...7...','...7...','...7...']},
  { name:'Duha', rows:['1111111111111','5555555555555','4444444444444','3333333333333','2222222222222']},
  { name:'Autíčko', rows:['..222222...','.22222222..','22222222222','22222222222','..7.....7..','.77.....77.']},
  { name:'Hora', rows:['.....6.....','....666....','...66666...','..6666666..','.666666666.','66666666666','33333333333','33333333333']},
  { name:'Banán', rows:['77.......','.444.....','..4444...','....4444.','.......47']},
  { name:'Mrkev', rows:['.3.3.3.','..333..','.55555.','.55555.','..555..','..555..','...5...','...5...']},
  { name:'Jahoda', rows:['.3.3.3.','..333..','.11111.','1111111','1111111','.11111.','..111..']},
  { name:'Třešně', rows:['..3...3..','...3.3...','.11...11.','1111.1111','.11...11.']},
  { name:'Meloun', rows:['..33333..','.3111113.','311111113','.1111111.','..11111..']},
  { name:'Zmrzlina', rows:['.88888.','8888888','.88888.','..777..','..777..','..777..','...7...','...7...']},
  { name:'Deštník', rows:['...666...','..66666..','.6666666.','666666666','....7....','....7....','....77...']},
  { name:'Loďka', rows:['....4....','...444...','..44444..','.4444444.','....7....','.2222222.','222222222']},
  { name:'Hvězda', rows:['....4....','....4....','..4.4.4..','.4.444.4.','444454444','.4.444.4.','..4.4.4..','....4....','....4....']},
  { name:'Ptáček', rows:['.222...','22222..','2222225','22222..','.222...']},
  { name:'Kachnička', rows:['.444...','44444..','4444445','44444..','.444...']},
  { name:'Želva', rows:['..3333...','.333333..','33333333.','.333333..','7.7...7.7','....7....']},
  { name:'Šnek', rows:['..666....','.66666...','6666663..','.333333..','..333333.','...3...3.']},
  { name:'Včelička', rows:['..22.22..','.444444..','4747474..','4747474..','.444444..','....7....']},
  { name:'Beruška', rows:['...77....','..1111...','.111711..','.117111..','..1111...','...11....']},
  { name:'Muchomůrka', rows:['..11111..','.1111111.','111111111','...777...','...777...','...777...']},
  { name:'Srdíčko', rows:['.11.11...','1181111..','111111111','.1111111.','..11111..','...111...','....1....']},
  { name:'Medvídek', rows:['77.....77','.7777777.','777777777','.7788877.','.7788877.','..77777..','..7.7.7..']}
];

let picIndex = 0;
let picDeck = [];
let selectedColor = null;
const boardEl = document.getElementById('board');
const paletteEl = document.getElementById('palette');
const titleEl = document.getElementById('title');

function nextPictureIndex(){
  if(picDeck.length === 0){
    picDeck = shuffle(Array.from({length: PICTURES.length}, (_, i) => i));
    if(picDeck[picDeck.length - 1] === picIndex && picDeck.length > 1){
      [picDeck[0], picDeck[picDeck.length - 1]] = [picDeck[picDeck.length - 1], picDeck[0]];
    }
  }
  return picDeck.pop();
}

function loadPicture(idx){
  const pic = PICTURES[idx];
  titleEl.textContent = '🎨 ' + pic.name;
  const rows = pic.rows;
  const numCols = rows[0].length;
  boardEl.style.gridTemplateColumns = `repeat(${numCols}, 1fr)`;
  boardEl.innerHTML = '';
  const usedColors = new Set();
  for(const row of rows) for(const ch of row) if(ch !== '.') usedColors.add(ch);
  for(let r=0; r<rows.length; r++){
    for(let c=0; c<numCols; c++){
      const ch = rows[r][c];
      const cellEl = document.createElement('div');
      cellEl.className = 'cell';
      if(ch === '.'){ cellEl.classList.add('blank'); }
      else { cellEl.classList.add('target'); cellEl.dataset.value = ch; cellEl.addEventListener('click', () => handleTap(cellEl, ch)); }
      boardEl.appendChild(cellEl);
    }
  }
  buildPalette(usedColors);
  renderPreview(rows, numCols);
}

function renderPreview(rows, numCols){
  const previewEl = document.getElementById('preview');
  previewEl.style.gridTemplateColumns = `repeat(${numCols}, 1fr)`;
  previewEl.innerHTML = '';
  for(const row of rows) for(const ch of row){
    const p = document.createElement('div'); p.className = 'pcell';
    if(ch !== '.') p.style.background = COLORS[ch];
    previewEl.appendChild(p);
  }
}

function buildPalette(usedColors){
  paletteEl.innerHTML = ''; selectedColor = null;
  const sorted = Array.from(usedColors).sort();
  sorted.forEach(num => {
    const sw = document.createElement('div'); sw.className = 'swatch';
    sw.style.background = COLORS[num]; sw.style.color = COLORS[num]; sw.dataset.value = num;
    sw.addEventListener('click', () => selectColor(num, sw));
    paletteEl.appendChild(sw);
  });
  const first = paletteEl.firstChild;
  if(first) selectColor(sorted[0], first);
}
function selectColor(num, el){ selectedColor = num; document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected')); el.classList.add('selected'); }

function handleTap(cellEl, value){
  if(cellEl.classList.contains('filled')) return;
  if(selectedColor === value){
    cellEl.classList.add('filled'); cellEl.style.background = COLORS[value]; cellEl.style.borderColor = COLORS[value];
    const targets = document.querySelectorAll('#board .cell.target');
    const filled = document.querySelectorAll('#board .cell.target.filled');
    if(targets.length === filled.length){
      celebrate();
      setTimeout(() => { picIndex = nextPictureIndex(); loadPicture(picIndex); }, 1800);
    }
  } else {
    cellEl.classList.add('wrong'); setTimeout(() => cellEl.classList.remove('wrong'), 300);
  }
}
document.getElementById('skip').addEventListener('click', () => { picIndex = nextPictureIndex(); loadPicture(picIndex); });
picIndex = nextPictureIndex(); loadPicture(picIndex);

/* ============================================================
   2) PEXESO
============================================================ */
const MEM_EMOJIS = ['🍎','🐱','🌻','🐶','🚗','⭐','🍓','🎈','🐟','🦋','🌈','☀️'];
const memGrid = document.getElementById('memGrid');
let memFlipped = [];
let memLock = false;

function newMemoryGame(){
  memGrid.innerHTML = ''; memFlipped = []; memLock = false;
  const chosen = shuffle([...MEM_EMOJIS]).slice(0, 3);
  const deck = shuffle([...chosen, ...chosen]);
  deck.forEach(emoji => {
    const card = document.createElement('div'); card.className = 'card'; card.dataset.emoji = emoji;
    card.innerHTML = `<div class="cardInner">
      <div class="cardFace cardBack">❓</div>
      <div class="cardFace cardFront">${emoji}</div>
    </div>`;
    card.addEventListener('click', () => flipCard(card));
    memGrid.appendChild(card);
  });
}

function flipCard(card){
  if(memLock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  memFlipped.push(card);
  if(memFlipped.length === 2){
    memLock = true;
    const [a,b] = memFlipped;
    if(a.dataset.emoji === b.dataset.emoji){
      a.classList.add('matched'); b.classList.add('matched');
      memFlipped = []; memLock = false;
      if(memGrid.querySelectorAll('.card.matched').length === memGrid.children.length){
        setTimeout(celebrate, 300);
      }
    } else {
      setTimeout(() => { a.classList.remove('flipped'); b.classList.remove('flipped'); memFlipped = []; memLock = false; }, 900);
    }
  }
}
document.getElementById('memNew').addEventListener('click', newMemoryGame);
newMemoryGame();

/* ============================================================
   3) BUBLINY
============================================================ */
const bubbleArea = document.getElementById('bubbleArea');
const popCountEl = document.getElementById('popCount');
let popCount = 0;
let bubbleInterval = null;
const BUBBLE_COLORS = ['#4fa8e8','#ff6f9c','#5cb85c','#ffd23f','#a06cd5','#ff8c42'];
const BUBBLE_EMOJI = ['🫧','⭐','💙','🌟'];

function spawnBubble(){
  const b = document.createElement('div');
  const size = 40 + Math.random()*60;
  b.className = 'bubble';
  b.style.width = size + 'px'; b.style.height = size + 'px';
  b.style.left = (Math.random()*85) + '%';
  b.style.bottom = '-80px';
  b.style.background = BUBBLE_COLORS[Math.floor(Math.random()*BUBBLE_COLORS.length)];
  b.textContent = Math.random() < 0.3 ? BUBBLE_EMOJI[Math.floor(Math.random()*BUBBLE_EMOJI.length)] : '';
  const duration = 5 + Math.random()*4;
  b.style.transition = `bottom ${duration}s linear, opacity .3s`;
  bubbleArea.appendChild(b);
  requestAnimationFrame(() => { b.style.bottom = '110%'; });
  const cleanup = () => b.remove();
  const timer = setTimeout(cleanup, duration*1000 + 200);
  b.addEventListener('click', () => {
    clearTimeout(timer);
    popCount++; popCountEl.textContent = '🫧 ' + popCount;
    b.style.transition = 'transform .2s, opacity .2s';
    b.style.transform = 'scale(1.6)'; b.style.opacity = '0';
    setTimeout(cleanup, 200);
  });
}
function startBubbles(){
  if(bubbleInterval) return;
  bubbleInterval = setInterval(spawnBubble, 700);
}
function stopBubbles(){
  if(bubbleInterval){ clearInterval(bubbleInterval); bubbleInterval = null; }
  bubbleArea.innerHTML = '';
}

/* ============================================================
   4) PUZZLE
============================================================ */
const PUZZLE_IMAGES = ['island-bg.png', 'stone.png'];
const puzzleTarget = document.getElementById('puzzleTarget');
const puzzleTray = document.getElementById('puzzleTray');
let puzzleSelected = null;

function buildPuzzlePiece(imgUrl, quadrant){
  const qx = quadrant % 2, qy = Math.floor(quadrant/2);
  const div = document.createElement('div');
  div.style.width = '100%'; div.style.height = '100%';
  div.style.backgroundImage = `url('${imgUrl}')`;
  div.style.backgroundSize = '200% 200%';
  div.style.backgroundPosition = `${qx*100}% ${qy*100}%`;
  return div;
}

function newPuzzle(){
  puzzleTarget.innerHTML = ''; puzzleTray.innerHTML = ''; puzzleSelected = null;
  const imgUrl = PUZZLE_IMAGES[Math.floor(Math.random()*PUZZLE_IMAGES.length)];
  for(let i=0;i<4;i++){
    const slot = document.createElement('div'); slot.className = 'slot'; slot.dataset.quadrant = i;
    slot.addEventListener('click', () => placeIntoSlot(slot));
    puzzleTarget.appendChild(slot);
  }
  const order = shuffle([0,1,2,3]);
  order.forEach(q => {
    const piece = document.createElement('div'); piece.className = 'piece'; piece.dataset.quadrant = q;
    piece.appendChild(buildPuzzlePiece(imgUrl, q));
    piece.addEventListener('click', () => selectPiece(piece));
    puzzleTray.appendChild(piece);
  });
}

function selectPiece(piece){
  document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
  piece.classList.add('selected');
  puzzleSelected = piece;
}

function placeIntoSlot(slot){
  if(!puzzleSelected || slot.children.length > 0) return;
  const correct = String(slot.dataset.quadrant) === String(puzzleSelected.dataset.quadrant);
  if(correct){
    slot.appendChild(puzzleSelected.firstChild);
    puzzleSelected.remove();
    puzzleSelected = null;
    if(puzzleTray.children.length === 0) setTimeout(celebrate, 300);
  } else {
    slot.style.animation = 'shake .3s ease';
    setTimeout(() => { slot.style.animation = ''; }, 300);
  }
}
document.getElementById('puzzleNew').addEventListener('click', newPuzzle);
newPuzzle();

const ANIMALS = [
  { emoji:'🐶', name:'Pes', sound:'Haf haf!' },
  { emoji:'🐱', name:'Kočka', sound:'Mňau mňau!' },
  { emoji:'🐄', name:'Kráva', sound:'Búúú!' },
  { emoji:'🐴', name:'Kůň', sound:'Íhahá!' },
  { emoji:'🐷', name:'Prase', sound:'Chro chro!' },
  { emoji:'🐑', name:'Ovce', sound:'Bééé!' },
  { emoji:'🐸', name:'Žába', sound:'Kvák kvák!' },
  { emoji:'🐔', name:'Slepice', sound:'Kokodák!' },
  { emoji:'🦆', name:'Kachna', sound:'Kvák kvák!' }
];
const animalGrid = document.getElementById('animalGrid');
const speechBubble = document.getElementById('speechBubble');
const playSoundBtn = document.getElementById('playSound');
let currentAnimal = null;
const animalButtons = [];

ANIMALS.forEach(a => {
  const btn = document.createElement('button'); btn.className = 'animalBtn'; btn.textContent = a.emoji;
  btn.addEventListener('click', () => checkGuess(a, btn));
  animalGrid.appendChild(btn);
  animalButtons.push(btn);
});

function playSound(sound){
  try{
    const u = new SpeechSynthesisUtterance(sound);
    u.lang = 'cs-CZ'; u.rate = 0.85; u.pitch = 1.2;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function newAnimalRound(){
  currentAnimal = ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
  animalButtons.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
  playSound(currentAnimal.sound);
}

function checkGuess(a, btn){
  if(!currentAnimal) return;
  if(a.name === currentAnimal.name){
    speechBubble.textContent = a.emoji + ' ' + a.name + '!';
    speechBubble.style.transition = 'transform .3s cubic-bezier(.34,1.56,.64,1)';
    speechBubble.style.transform = 'translate(-50%,0) scale(1)';
    setTimeout(() => { speechBubble.style.transform = 'translate(-50%,0) scale(0)'; }, 1300);
    celebrate();
    animalButtons.forEach(b => { b.disabled = true; });
    setTimeout(newAnimalRound, 1600);
  } else {
    btn.style.animation = 'shake .3s ease';
    setTimeout(() => { btn.style.animation = ''; }, 300);
  }
}

playSoundBtn.addEventListener('click', () => { if(currentAnimal) playSound(currentAnimal.sound); });

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
